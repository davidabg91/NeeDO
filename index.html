<!DOCTYPE html>
<html lang="bg">

<head>
   <meta charset="UTF-8">
   <meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
   <meta name="mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
   <meta name="apple-mobile-web-app-title" content="Needo">
   <meta name="theme-color" content="#ffffff">

   <!-- Favicons & Manifest to prevent 404 loading loops -->
   <link rel="icon" type="image/png" href="/favicon.png" />
   <link rel="apple-touch-icon" href="/favicon.png" />
   <link rel="manifest" href="/manifest.json" />

   <title>Needo - Твоят AI асистент за услуги</title>
   <meta name="description" content="Намери правилния изпълнител за всяка задача с помощта на AI. Снимай, публикувай и получи оферти веднага на needobg.com." />
   
   <!-- Facebook / Open Graph -->
   <meta property="og:type" content="website" />
   <meta property="og:url" content="https://needobg.com/" />
   <meta property="og:title" content="Needo - Твоят AI асистент за услуги" />
   <meta property="og:description" content="Намери правилния изпълнител за всяка задача с помощта на AI. Снимай, публикувай и получи оферти веднага." />
   <meta property="og:image" content="https://needobg.com/logo.jpg" />
   <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap');

      :root {
         --sat: env(safe-area-inset-top);
         --sab: env(safe-area-inset-bottom);
      }

      body {
         font-family: 'Inter', sans-serif;
         overscroll-behavior-y: none;
         /* Prevents pull-to-refresh on mobile */
         -webkit-tap-highlight-color: transparent;
         /* Removes gray tap box on iOS */
         position: fixed;
         /* Locks body for app feel */
         top: 0;
         left: 0;
         width: 100%;
         height: 100%;
         overflow: hidden;
         touch-action: pan-x pan-y;
         /* Optimize touch actions */
         -webkit-user-select: none;
         /* Disable text selection for app-like feel */
         user-select: none;
         background-color: #f8fafc;
      }

      /* Allow text selection only on inputs and paragraphs inside specific content areas if needed */
      input,
      textarea {
         -webkit-user-select: text;
         user-select: text;
      }

      /* Simple fade animations for modals */
      .animate-in {
         animation: fade-in 0.2s ease-out forwards;
      }

      @keyframes fade-in {
         from {
            opacity: 0;
         }

         to {
            opacity: 1;
         }
      }

      /* Hide Scrollbar but keep functionality */
      .scrollbar-hide::-webkit-scrollbar {
         display: none;
      }

      .scrollbar-hide {
         -ms-overflow-style: none;
         scrollbar-width: none;
      }

      /* Custom Scrollbar for desktop feeling when visible */
      .scrollbar-thin::-webkit-scrollbar {
         width: 6px;
      }

      .scrollbar-thin::-webkit-scrollbar-track {
         background: transparent;
      }

      .scrollbar-thin::-webkit-scrollbar-thumb {
         background-color: rgba(0, 0, 0, 0.1);
         border-radius: 20px;
      }

      /* Safe area padding for iPhones with notch */
      .pt-safe-top {
         padding-top: max(20px, env(safe-area-inset-top));
      }

      .pb-safe-bottom {
         padding-bottom: max(20px, env(safe-area-inset-bottom));
      }

      .safe-area-bottom {
         padding-bottom: env(safe-area-inset-bottom);
      }
   </style>

   <link rel="stylesheet" href="index.css">
</head>

<body>
   <div id="root" class="w-full h-full">
      <!-- Instant Branded Splash Screen -->
      <div id="initial-splash"
         style="position: fixed; inset: 0; background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: 'Inter', sans-serif;">
         <div
            style="display: flex; flex-direction: column; align-items: center; gap: 20px; animation: splash-fade-in 0.6s ease-out forwards;">
            <div
               style="width: 80px; height: 80px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 4px solid white;">
               <img src="logo.jpg" alt="Needo" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div style="text-align: center;">
               <h1 style="margin: 0; font-weight: 900; font-size: 32px; letter-spacing: -1px; color: #0f172a;">
                  needo<span style="color: #3b82f6;">.</span>
               </h1>
               <div style="margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                  <div class="splash-dot"
                     style="width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; opacity: 0.3; animation: splash-dots 1.4s infinite linear;">
                  </div>
                  <div class="splash-dot"
                     style="width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; opacity: 0.3; animation: splash-dots 1.4s infinite linear 0.2s;">
                  </div>
                  <div class="splash-dot"
                     style="width: 6px; height: 6px; background: #3b82f6; border-radius: 50%; opacity: 0.3; animation: splash-dots 1.4s infinite linear 0.4s;">
                  </div>
               </div>
            </div>
         </div>
         <style>
            @keyframes splash-fade-in {
               from {
                  opacity: 0;
                  transform: translateY(10px);
               }

               to {
                  opacity: 1;
                  transform: translateY(0);
               }
            }

            @keyframes splash-dots {

               0%,
               100% {
                  opacity: 0.3;
                  transform: scale(1);
               }

               50% {
                  opacity: 1;
                  transform: scale(1.2);
               }
            }

            .splash-dot {
               border-radius: 50%;
            }
         </style>
      </div>
   </div>
   <script type="module" src="index.tsx"></script>
</body>

</html>
